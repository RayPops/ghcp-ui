<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background tile in the existing brand purple -->
  <rect width="32" height="32" rx="8" fill="#8B5CF6"/>
  <!-- Simplified RadioTower glyph, white on purple -->
  <g stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer signal arcs -->
    <path d="M7.5 11.5a6 6 0 0 1 0-7"/>
    <path d="M24.5 4.5a6 6 0 0 1 0 7"/>
    <!-- Inner signal arcs -->
    <path d="M10.5 9.5a3 3 0 0 1 0-3"/>
    <path d="M21.5 6.5a3 3 0 0 1 0 3"/>
    <!-- Mast + cross-strut -->
    <path d="M13 26l3-18 3 18"/>
    <path d="M14 19h4"/>
  </g>
  <!-- Central transmitter dot -->
  <circle cx="16" cy="8" r="1.6" fill="white"/>
</svg>
